# TorchServe 配置文件
# 文档：https://pytorch.org/serve/configuration.html

# 推理接口端口（对外暴露）
inference_address=http://0.0.0.0:8080
# 管理接口端口（内网使用）
management_address=http://0.0.0.0:8081
# 监控指标端口
metrics_address=http://0.0.0.0:8082

# 每个模型最多使用的 worker 数（CPU 推理建议 = CPU 核心数）
default_workers_per_model=2

# 动态 batching：最多等待 50ms 凑够 batch，最大 batch_size=64
batch_size=64
max_batch_delay=50

# 请求体最大 10MB（结构化特征一般很小，1MB 足够）
max_request_size=10485760

# 日志级别
vmargs=-Dlog4j.configuration=file:log4j2.xml
