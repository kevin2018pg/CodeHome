<text x="1100" y="58" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="800" text-anchor="middle" fill="#111827">tencent_advertising_gr: Generative Sequential Recommendation Architecture</text>
<text x="1100" y="94" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="500" text-anchor="middle" fill="#475569">HSTU-based action-conditioned next-item retrieval with mixed negative sampled softmax</text>
