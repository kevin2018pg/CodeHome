<rect x="560" y="430" width="375" height="160" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="2.2"/><text x="747.5" y="464" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111827"><tspan x="747.5" dy="0">Item Tower</tspan></text><text x="747.5" y="504" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#374151"><tspan x="747.5" dy="0">item_id + sparse / array</tspan><tspan x="747.5" dy="24.32">continuous + dense multimodal</tspan><tspan x="747.5" dy="24.32">MLP -&gt; 512-d item vector</tspan></text>
<rect x="560" y="660" width="375" height="140" rx="10" fill="#ecfdf5" stroke="#047857" stroke-width="2.2"/><text x="747.5" y="694" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111827"><tspan x="747.5" dy="0">FiLM Conditioning</tspan></text><text x="747.5" y="734" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#374151"><tspan x="747.5" dy="0">aggregate user vector u</tspan><tspan x="747.5" dy="24.32">gamma, beta = Linear(u)</tspan><tspan x="747.5" dy="24.32">x = x * (1 + gamma) + beta</tspan></text>
<rect x="560" y="890" width="375" height="160" rx="10" fill="#ecfdf5" stroke="#047857" stroke-width="2.2"/><text x="747.5" y="924" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111827"><tspan x="747.5" dy="0">Context Injection</tspan></text><text x="747.5" y="964" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#374151"><tspan x="747.5" dy="0">cyclic time sin/cos</tspan><tspan x="747.5" dy="24.32">next-action embedding</tspan><tspan x="747.5" dy="24.32">position embedding</tspan></text>
<rect x="1070" y="215" width="475" height="105" rx="10" fill="#fff7ed" stroke="#c2410c" stroke-width="2.2"/><text x="1307.5" y="249" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111827"><tspan x="1307.5" dy="0">Sequence Input</tspan></text><text x="1307.5" y="289" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#374151"><tspan x="1307.5" dy="0">conditioned token embeddings x_t</tspan></text>
<rect x="1070" y="365" width="475" height="120" rx="10" fill="#fff7ed" stroke="#c2410c" stroke-width="2.2"/><text x="1307.5" y="399" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111827"><tspan x="1307.5" dy="0">UVQK Projection</tspan></text><text x="1307.5" y="439" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#374151"><tspan x="1307.5" dy="0">single linear -&gt; U, V, Q, K</tspan><tspan x="1307.5" dy="24.32">multi-head split</tspan></text>
<rect x="1070" y="530" width="475" height="145" rx="10" fill="#fffbeb" stroke="#b45309" stroke-width="2.2"/><text x="1307.5" y="564" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111827"><tspan x="1307.5" dy="0">Pointwise Attention</tspan></text><text x="1307.5" y="604" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#374151"><tspan x="1307.5" dy="0">A = SiLU(QK^T / sqrt(d) + RAB)</tspan><tspan x="1307.5" dy="24.32">causal + padding mask</tspan><tspan x="1307.5" dy="24.32">no softmax</tspan></text>
<rect x="1070" y="725" width="475" height="120" rx="10" fill="#fefce8" stroke="#a16207" stroke-width="2.2"/><text x="1307.5" y="759" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111827"><tspan x="1307.5" dy="0">Temporal RAB</tspan></text><text x="1307.5" y="799" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#374151"><tspan x="1307.5" dy="0">log-bucketed timestamp difference</tspan><tspan x="1307.5" dy="24.32">shared across HSTU layers</tspan></text>
<rect x="1070" y="890" width="475" height="140" rx="10" fill="#fff7ed" stroke="#c2410c" stroke-width="2.2"/><text x="1307.5" y="924" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111827"><tspan x="1307.5" dy="0">Gated Transduction</tspan></text><text x="1307.5" y="964" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#374151"><tspan x="1307.5" dy="0">Y = A @ V</tspan><tspan x="1307.5" dy="24.32">LayerNorm(Y) * U</tspan><tspan x="1307.5" dy="24.32">output projection + residual</tspan></text>
<rect x="1685" y="220" width="410" height="120" rx="10" fill="#fdf2f8" stroke="#be185d" stroke-width="2.2"/><text x="1890.0" y="254" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111827"><tspan x="1890.0" dy="0">Query &amp; Positives</tspan></text><text x="1890.0" y="294" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#374151"><tspan x="1890.0" dy="0">Q: HSTU output per token</tspan><tspan x="1890.0" dy="24.32">K+: encoded next item</tspan></text>
<rect x="1685" y="385" width="410" height="125" rx="10" fill="#fdf2f8" stroke="#be185d" stroke-width="2.2"/><text x="1890.0" y="419" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111827"><tspan x="1890.0" dy="0">Mixed Negatives</tspan></text><text x="1890.0" y="459" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#374151"><tspan x="1890.0" dy="0">in-batch positives</tspan><tspan x="1890.0" dy="24.32">global random negatives</tspan><tspan x="1890.0" dy="24.32">false-negative filtering</tspan></text>
<rect x="1685" y="545" width="410" height="70" rx="10" fill="#fce7f3" stroke="#9d174d" stroke-width="2.2"/><text x="1890.0" y="579" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111827"><tspan x="1890.0" dy="0">Loss: sampled softmax with -log q(i)</tspan></text><text x="1890.0" y="619" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#374151"><tspan x="1890.0" dy="0">hard top-k curriculum</tspan></text>
<rect x="1685" y="770" width="410" height="115" rx="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2.2"/><text x="1890.0" y="804" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111827"><tspan x="1890.0" dy="0">Candidate Encoding</tspan></text><text x="1890.0" y="844" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#374151"><tspan x="1890.0" dy="0">predict_set.jsonl</tspan><tspan x="1890.0" dy="24.32">item tower -&gt; normalized matrix</tspan></text>
<rect x="1685" y="930" width="410" height="115" rx="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2.2"/><text x="1890.0" y="964" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111827"><tspan x="1890.0" dy="0">User Query</tspan></text><text x="1890.0" y="1004" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#374151"><tspan x="1890.0" dy="0">predict_seq.jsonl history</tspan><tspan x="1890.0" dy="24.32">target action condition</tspan><tspan x="1890.0" dy="24.32">final HSTU state</tspan></text>
