<rect x="1025" y="140" width="565" height="1030" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2.4" stroke-dasharray="8 7"/><text x="1047" y="178" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="start" fill="#0f172a">3. HSTU Sequence Model</text>
