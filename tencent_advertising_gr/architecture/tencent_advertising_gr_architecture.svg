<rect x="80" y="715" width="350" height="150" rx="10" fill="#eef2ff" stroke="#4338ca" stroke-width="2.2"/><text x="255.0" y="749" font-family="Helvetica, Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111827"><tspan x="255.0" dy="0">Dataset Collate</tspan></text><text x="255.0" y="789" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#374151"><tspan x="255.0" dy="0">left-padded sequences</tspan><tspan x="255.0" dy="24.32">token_type: item=1, user=2</tspan><tspan x="255.0" dy="24.32">packed feature tensors</tspan></text>
